<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="style.css">

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
    h2{
      font-family: 'Tahoma';
      font-weight: 100;
      font-size: 16px;
      color: hsl(0, 0%, 42%);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <img src="/blog-preview-card-main/assets/images/illustration-article.svg">
      <div class="learning">
        <p>Learning</p>
      </div>
      <div class="publish">
          <p>Published 21 Dec 2023</p>
      </div>
      <div class="html">
        <h1> HTML & CSS foundations</h1>
        
      </div class="p2">
      <h2>These languages are the backbone of every <br>website, defining structure, content and<br>presentation.</h2>
      </div>
      <div class="avatar">
        <img src="/blog-preview-card-main/assets/images/image-avatar.webp">
        <p>Greg Hooper</p>
      </div>

  </div>
